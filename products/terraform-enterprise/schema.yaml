x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: '1.1.3'
  publishedVersionMetadata:
    releaseNote: "Terraform Enterprise for GCP Marketplace"
    releaseTypes:
    - Feature
    recommended: true
  partnerId: 0014M00001h317WQAQ
  solutionId: terraform-enterprise

  clusterConstraints:
    resources:
    - replicas: 1
      requests:
        cpu: 2000m
        memory: 4Gi

  images:
    '':
      properties:
        tfeImage:
          type: FULL
    ubbagent:
      properties:
        ubbagentImage:
          type: FULL

properties:
  name:
    type: string
    x-google-marketplace:
      type: NAME

  namespace:
    type: string
    x-google-marketplace:
      type: NAMESPACE

  # ---------------------------------------------------------------------------
  # TFE Configuration
  # ---------------------------------------------------------------------------

  hostname:
    type: string
    title: TFE Hostname (FQDN)
    description: "Fully qualified domain name for TFE (e.g., tfe.example.com)"

  tfeLicense:
    type: string
    title: TFE License (base64)
    description: "Base64-encoded TFE license file content"
    x-google-marketplace:
      type: MASKED_FIELD

  encryptionPassword:
    type: string
    title: Encryption Password
    description: "Encryption password for TFE data (minimum 16 characters)"
    x-google-marketplace:
      type: MASKED_FIELD

  # ---------------------------------------------------------------------------
  # TLS Certificates (base64-encoded)
  # ---------------------------------------------------------------------------

  tlsCertificate:
    type: string
    title: TLS Certificate (base64)
    description: "Base64-encoded TLS certificate (PEM format)"
    x-google-marketplace:
      type: MASKED_FIELD

  tlsPrivateKey:
    type: string
    title: TLS Private Key (base64)
    description: "Base64-encoded TLS private key (PEM format)"
    x-google-marketplace:
      type: MASKED_FIELD

  tlsCACertificate:
    type: string
    title: CA Certificate (base64)
    description: "Base64-encoded CA certificate bundle (PEM format)"
    x-google-marketplace:
      type: MASKED_FIELD

  # ---------------------------------------------------------------------------
  # Service Account for Workload Identity
  # ---------------------------------------------------------------------------

  tfeServiceAccount:
    type: string
    title: TFE Service Account
    x-google-marketplace:
      type: SERVICE_ACCOUNT
      serviceAccount:
        description: "TFE service account for in-cluster operations"
        roles:
        - type: Role
          rulesType: CUSTOM
          rules:
          - apiGroups: ['']
            resources: ['secrets', 'configmaps']
            verbs: ['get', 'list', 'watch', 'create', 'update', 'delete']

  # ---------------------------------------------------------------------------
  # Billing / Reporting
  # ---------------------------------------------------------------------------

  reportingSecret:
    type: string
    x-google-marketplace:
      type: REPORTING_SECRET

required:
  - name
  - namespace
  - hostname
  - tfeLicense
  - encryptionPassword
  - tlsCertificate
  - tlsPrivateKey
  - tlsCACertificate
  - reportingSecret
